# Data source label passed to reward compute_score(data_source=...).
data_source: activeultrafeedback

# Null means: let VERL use actor_rollout_ref.rollout.agent.default_agent_loop.
agent_name: null

validate: false

candidate_selection:
  enabled: false
  # Number of rollout candidates generated for each selected online train slot.
  # QRPO still trains on one selected candidate per slot.
  candidates_per_train_sample: 1
  probability: 1.0
  selection: best_reward
  seed: 0

completion_logging:
  enabled: false
  outputs: ["wandb"]  # console | wandb
  selection: random  # all | first | random | top_reward | bottom_reward
  n: 8
  seed: 0
  max_chars: 2000
