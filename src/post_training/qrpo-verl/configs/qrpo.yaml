defaults:
  - data: default
  - source_schedule: fixed_counts
  - offline_selector: minmax_rewards
  - _self_

qrpo:
  beta: 0.05
  transform: identity
  length_normalization: false

# Project-level knobs. Prefer overriding these instead of editing actor/ref
# in multiple places.
qrpo_runtime:
  strategy: fsdp2

  model_dtype: bfloat16
  compute_dtype: bfloat16

  train_mini_batch_size: ${data.train_batch_size}
  train_micro_batch_size_per_gpu: 16

  log_prob_micro_batch_size_per_gpu: 16
  max_token_len_per_gpu: 16384

  lr: 1.0e-6
  weight_decay: 0.0
  grad_clip: 1.0

  lr_warmup_steps_ratio: 0.03
  lr_scheduler_type: cosine
  min_lr_ratio: 0.0

  data_loader_seed: 1

ray_kwargs:
  ray_init:
    num_cpus: null

tokenizer:
  use_eos_as_pad: false

data:
  train_batch_size: 128
  val_batch_size: 128

  max_prompt_length: 4096
  max_response_length: 4096

  shuffle: true
  validation_shuffle: false
  seed: 1

trainer:
  use_legacy_worker_impl: disable

  nnodes: 1
  n_gpus_per_node: 4
  device: cuda

  total_epochs: 1
  total_training_steps: null

  project_name: qrpo
  experiment_name: qrpo_full_ft
  logger: ["console"]

  val_before_train: false
  val_only: false

  test_freq: 0
  save_freq: 10000

  log_val_generations: 0
  rollout_data_dir: null
  validation_data_dir: null

  balance_batch: true
  critic_warmup: 0

  default_hdfs_dir: null
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  del_local_ckpt_after_load: false
  max_actor_ckpt_to_keep: 3
  max_critic_ckpt_to_keep: null

  ray_wait_register_center_timeout: 300

  resume_mode: disable
  resume_from_path: null

  esi_redundant_time: 0

actor_rollout_ref:
  hybrid_engine: true

  model:
    _target_: verl.workers.config.HFModelConfig

    path: null
    hf_config_path: null
    tokenizer_path: null

    use_shm: false
    trust_remote_code: ${oc.select:data.trust_remote_code,false}
    custom_chat_template: null
    external_lib: null
    override_config: {}

    enable_gradient_checkpointing: true
    enable_activation_offload: false
    use_remove_padding: true

    # Full fine-tuning. LoRA disabled.
    lora_rank: 0
    lora_alpha: 16
    target_modules: all-linear
    exclude_modules: null
    lora_adapter_path: null

    use_liger: false
    use_fused_kernels: false
    fused_kernel_options:
      impl_backend: torch

    tiled_mlp:
      enabled: false
      num_shards: 4

    mtp:
      _target_: verl.workers.config.MtpConfig
      enable: false
      enable_train: false
      enable_rollout: false
      detach_encoder: false
      mtp_loss_scaling_factor: 0.1
      speculative_algorithm: EAGLE
      speculative_num_steps: 3
      speculative_eagle_topk: 1
      speculative_num_draft_tokens: 4
      method: mtp
      num_speculative_tokens: 1

  actor:
    _target_: verl.workers.config.FSDPActorConfig

    rollout_n: ${oc.select:actor_rollout_ref.rollout.n,1}

    strategy: ${qrpo_runtime.strategy}

    ppo_mini_batch_size: ${qrpo_runtime.train_mini_batch_size}

    use_dynamic_bsz: false
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: ${qrpo_runtime.train_micro_batch_size_per_gpu}
    ppo_max_token_len_per_gpu: ${qrpo_runtime.max_token_len_per_gpu}

    use_kl_loss: false
    ppo_epochs: 1
    shuffle: true
    data_loader_seed: ${qrpo_runtime.data_loader_seed}

    entropy_coeff: 0.0
    calculate_entropy: false
    calculate_sum_pi_squared: false
    sum_pi_squared_checkpointing: false

    use_prefix_grouper: false
    use_torch_compile: true

    kl_loss_coef: 0.0
    kl_loss_type: low_var_kl
    grad_clip: ${qrpo_runtime.grad_clip}

    ulysses_sequence_parallel_size: 1
    entropy_from_logits_with_chunking: false
    entropy_checkpointing: false

    use_remove_padding: ${oc.select:actor_rollout_ref.model.use_remove_padding,false}
    use_fused_kernels: ${oc.select:actor_rollout_ref.model.use_fused_kernels,false}

    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    clip_ratio_c: 3.0
    tau_pos: 1.0
    tau_neg: 1.05
    freeze_vision_tower: false

    loss_agg_mode: token-mean
    loss_scale_factor: null

    optim:
      _target_: verl.workers.config.FSDPOptimizerConfig

      optimizer: AdamW
      optimizer_impl: torch.optim

      lr: ${qrpo_runtime.lr}
      weight_decay: ${qrpo_runtime.weight_decay}

      lr_warmup_steps_ratio: ${qrpo_runtime.lr_warmup_steps_ratio}
      lr_warmup_steps: -1
      total_training_steps: -1

      betas:
        - 0.9
        - 0.999

      clip_grad: ${qrpo_runtime.grad_clip}

      min_lr_ratio: ${qrpo_runtime.min_lr_ratio}
      num_cycles: 0.5
      lr_scheduler_type: ${qrpo_runtime.lr_scheduler_type}
      zero_indexed_step: true

      warmup_style: null
      override_optimizer_config: null

    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig

      strategy: ${qrpo_runtime.strategy}

      wrap_policy:
        min_num_params: 0

      param_offload: false
      optimizer_offload: false
      offload_policy: false

      reshard_after_forward: true
      fsdp_size: -1
      forward_prefetch: false

      model_dtype: ${qrpo_runtime.model_dtype}
      dtype: ${qrpo_runtime.compute_dtype}

      use_orig_params: false
      seed: 42
      full_determinism: false

      ulysses_sequence_parallel_size: 1
      entropy_from_logits_with_chunking: false
      use_torch_compile: true
      entropy_checkpointing: false
      forward_only: false

      qat:
        _target_: verl.workers.config.QATEngineConfig
        enable: false
        mode: w4a16
        group_size: 16
        ignore_patterns:
          - lm_head
          - embed_tokens
          - re:.*mlp.gate$
        activation_observer: static_minmax
        quantization_config_path: null

    policy_loss:
      _target_: verl.workers.config.PolicyLossConfig
      loss_mode: vanilla
      clip_cov_ratio: 0.0002
      clip_cov_lb: 1.0
      clip_cov_ub: 5.0
      kl_cov_ratio: 0.0002
      ppo_kl_coef: 0.1
      rollout_correction: {}

    checkpoint:
      _target_: verl.trainer.config.CheckpointConfig
      save_contents:
        - model
        - optimizer
        - extra
      load_contents: ${.save_contents}
      async_save: false
      mbridge_config: {}

    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      tool: ${oc.select:global_profiler.tool,null}
      enable: false
      all_ranks: false
      ranks: []
      save_path: ${oc.select:global_profiler.save_path,null}
      tool_config:
        nsys:
          _target_: verl.utils.profiler.config.NsightToolConfig
          discrete: ${oc.select:global_profiler.global_tool_config.nsys.discrete,false}
        npu:
          _target_: verl.utils.profiler.config.NPUToolConfig
          contents: []
          level: level0
          analysis: false
          discrete: false
        torch:
          _target_: verl.utils.profiler.config.TorchProfilerToolConfig
          contents: []
          discrete: false
        torch_memory:
          _target_: verl.utils.profiler.config.TorchMemoryToolConfig
          trace_alloc_max_entries: ${oc.select:global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
          stack_depth: ${oc.select:global_profiler.global_tool_config.torch_memory.stack_depth,32}

    router_replay:
      _target_: verl.workers.config.RouterReplayConfig
      mode: disabled
      record_file: null
      replay_file: null

    qat:
      enable: false
      mode: w4a16
      group_size: 16
      ignore_patterns:
        - lm_head
        - embed_tokens
        - re:.*mlp.gate$
      activation_observer: static_minmax
      quantization_config_path: null

  ref:
    _target_: verl.workers.config.FSDPActorConfig

    rollout_n: ${oc.select:actor_rollout_ref.rollout.n,1}

    strategy: ${actor_rollout_ref.actor.strategy}

    use_torch_compile: ${oc.select:actor_rollout_ref.actor.use_torch_compile,true}

    ppo_mini_batch_size: ${actor_rollout_ref.actor.ppo_mini_batch_size}

    # VERL 0.7.1 new engine reads these ref.log_prob_* fields,
    # then maps them into ppo_* before constructing FSDPActorConfig.
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: ${qrpo_runtime.log_prob_micro_batch_size_per_gpu}
    log_prob_use_dynamic_bsz: false
    log_prob_max_token_len_per_gpu: ${qrpo_runtime.max_token_len_per_gpu}

    # These are overwritten by log_prob_* during ref worker initialization.
    use_dynamic_bsz: false
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: null
    ppo_max_token_len_per_gpu: ${qrpo_runtime.max_token_len_per_gpu}

    ppo_epochs: ${oc.select:actor_rollout_ref.actor.ppo_epochs,1}
    shuffle: false
    data_loader_seed: ${qrpo_runtime.data_loader_seed}

    entropy_coeff: 0.0
    calculate_entropy: false
    calculate_sum_pi_squared: false
    sum_pi_squared_checkpointing: false

    use_kl_loss: false
    use_prefix_grouper: false
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    grad_clip: ${qrpo_runtime.grad_clip}

    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    clip_ratio_c: 3.0
    tau_pos: 1.0
    tau_neg: 1.05
    freeze_vision_tower: false

    loss_agg_mode: token-mean
    loss_scale_factor: null

    ulysses_sequence_parallel_size: ${oc.select:actor_rollout_ref.actor.ulysses_sequence_parallel_size,1}
    entropy_from_logits_with_chunking: false
    entropy_checkpointing: false

    use_remove_padding: ${oc.select:actor_rollout_ref.model.use_remove_padding,false}
    use_fused_kernels: ${oc.select:actor_rollout_ref.model.use_fused_kernels,false}

    optim:
      _target_: verl.workers.config.FSDPOptimizerConfig

      optimizer: AdamW
      optimizer_impl: torch.optim

      lr: ${qrpo_runtime.lr}
      weight_decay: ${qrpo_runtime.weight_decay}

      lr_warmup_steps_ratio: ${qrpo_runtime.lr_warmup_steps_ratio}
      lr_warmup_steps: -1
      total_training_steps: -1

      betas:
        - 0.9
        - 0.999

      clip_grad: ${qrpo_runtime.grad_clip}

      min_lr_ratio: ${qrpo_runtime.min_lr_ratio}
      num_cycles: 0.5
      lr_scheduler_type: ${qrpo_runtime.lr_scheduler_type}
      zero_indexed_step: true

      warmup_style: null
      override_optimizer_config: null

    fsdp_config:
      _target_: verl.workers.config.FSDPEngineConfig

      strategy: ${actor_rollout_ref.actor.fsdp_config.strategy}

      wrap_policy:
        min_num_params: 0

      param_offload: false
      optimizer_offload: false
      offload_policy: false

      reshard_after_forward: true
      fsdp_size: -1
      forward_prefetch: false

      model_dtype: ${qrpo_runtime.model_dtype}
      dtype: ${qrpo_runtime.compute_dtype}

      use_orig_params: false
      seed: 42
      full_determinism: false

      ulysses_sequence_parallel_size: 1
      entropy_from_logits_with_chunking: false
      use_torch_compile: true
      entropy_checkpointing: false
      forward_only: true

      qat:
        _target_: verl.workers.config.QATEngineConfig
        enable: false
        mode: w4a16
        group_size: 16
        ignore_patterns:
          - lm_head
          - embed_tokens
          - re:.*mlp.gate$
        activation_observer: static_minmax
        quantization_config_path: null

    policy_loss:
      _target_: verl.workers.config.PolicyLossConfig
      loss_mode: vanilla
      clip_cov_ratio: 0.0002
      clip_cov_lb: 1.0
      clip_cov_ub: 5.0
      kl_cov_ratio: 0.0002
      ppo_kl_coef: 0.1
      rollout_correction: {}

    checkpoint:
      _target_: verl.trainer.config.CheckpointConfig
      save_contents:
        - model
        - optimizer
        - extra
      load_contents: ${.save_contents}
      async_save: false
      mbridge_config: {}

    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      tool: ${oc.select:global_profiler.tool,null}
      enable: false
      all_ranks: false
      ranks: []
      save_path: ${oc.select:global_profiler.save_path,null}
      tool_config:
        nsys:
          _target_: verl.utils.profiler.config.NsightToolConfig
          discrete: ${oc.select:global_profiler.global_tool_config.nsys.discrete,false}
        npu:
          _target_: verl.utils.profiler.config.NPUToolConfig
          contents: []
          level: level0
          analysis: false
          discrete: false
        torch:
          _target_: verl.utils.profiler.config.TorchProfilerToolConfig
          contents: []
          discrete: false
        torch_memory:
          _target_: verl.utils.profiler.config.TorchMemoryToolConfig
          trace_alloc_max_entries: ${oc.select:global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
          stack_depth: ${oc.select:global_profiler.global_tool_config.torch_memory.stack_depth,32}

    router_replay:
      _target_: verl.workers.config.RouterReplayConfig
      mode: disabled
      record_file: null
      replay_file: null

    qat:
      enable: false
      mode: w4a16
      group_size: 16
      ignore_patterns:
        - lm_head
        - embed_tokens
        - re:.*mlp.gate$
      activation_observer: static_minmax
      quantization_config_path: null

  rollout:
    _target_: verl.workers.config.RolloutConfig

    name: vllm
    mode: async

    nnodes: 0
    n_gpus_per_node: ${oc.select:trainer.n_gpus_per_node,4}

    temperature: 1.0
    top_k: -1
    top_p: 1.0

    prompt_length: ${oc.select:data.max_prompt_length,4096}
    response_length: ${oc.select:data.max_response_length,4096}

    dtype: ${qrpo_runtime.compute_dtype}
    gpu_memory_utilization: 0.5

    ignore_eos: false
    enforce_eager: false
    cudagraph_capture_sizes: null
    free_cache_engine: true

    tensor_model_parallel_size: 1
    data_parallel_size: 1
    expert_parallel_size: 1
    pipeline_model_parallel_size: 1

    max_num_batched_tokens: 8192
    max_model_len: 8192
    max_num_seqs: 256

    enable_chunked_prefill: true
    enable_prefix_caching: true

    logprobs_mode: processed_logprobs
    scheduling_policy: fcfs
    load_format: dummy
    layered_summon: false

    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: ${qrpo_runtime.log_prob_micro_batch_size_per_gpu}
    log_prob_use_dynamic_bsz: false
    log_prob_max_token_len_per_gpu: ${qrpo_runtime.max_token_len_per_gpu}

    disable_log_stats: true
    do_sample: true
    n: 1
    over_sample_rate: 0
    multi_stage_wake_up: false

    engine_kwargs:
      vllm: {}
      sglang: {}
      trtllm: {}

    val_kwargs:
      _target_: verl.workers.config.SamplingConfig
      top_k: -1
      top_p: 1.0
      temperature: 0
      n: 1
      do_sample: false

    multi_turn:
      _target_: verl.workers.config.MultiTurnConfig
      enable: false
      max_assistant_turns: null
      tool_config_path: null
      max_user_turns: null
      max_parallel_calls: 1
      max_tool_response_length: 256
      tool_response_truncate_side: middle
      interaction_config_path: null
      use_inference_chat_template: false
      tokenization_sanity_check_mode: strict
      format: hermes
      num_repeat_rollouts: null

    calculate_log_probs: false

    agent:
      _target_: verl.workers.config.AgentLoopConfig
      num_workers: 1
      default_agent_loop: single_turn_agent
      agent_loop_config_path: null
      custom_async_server:
        _target_: verl.workers.config.CustomAsyncServerConfig
        path: null
        name: null

    checkpoint_engine:
      _target_: verl.workers.config.CheckpointEngineConfig
      backend: naive
      update_weights_bucket_megabytes: 2048
      engine_kwargs: {}

    trace:
      _target_: verl.workers.config.TraceConfig
      project_name: ${oc.select:trainer.project_name,null}
      experiment_name: ${oc.select:trainer.experiment_name,null}
      backend: null
      token2text: false
      max_samples_per_step_per_worker: null

    skip_rollout: false
    skip_dump_dir: /tmp/rollout_dump
    skip_tokenizer_init: true
    enable_rollout_routing_replay: false

    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      tool: ${oc.select:global_profiler.tool,null}
      enable: false
      all_ranks: false
      ranks: []
      save_path: ${oc.select:global_profiler.save_path,null}
      tool_config:
        npu:
          _target_: verl.utils.profiler.config.NPUToolConfig
          contents: []
          level: level0
          analysis: false
          discrete: false
        torch:
          _target_: verl.utils.profiler.config.TorchProfilerToolConfig
          contents: []
          discrete: false

    prometheus:
      _target_: verl.workers.config.PrometheusConfig
      enable: false
      port: 9090
      file: /tmp/ray/session_latest/metrics/prometheus/prometheus.yml
      served_model_name: ${oc.select:actor_rollout_ref.model.path,null}

    quantization: null
    quantization_config_file: null
    mtp: ${oc.select:actor_rollout_ref.model.mtp,null}
    qat: ${oc.select:actor_rollout_ref.actor.fsdp_config.qat,null}

algorithm:
  _target_: verl.trainer.config.AlgoConfig

  gamma: 1.0
  lam: 1.0

  # Compatibility only. QRPOTrainer.fit does not compute PPO/GRPO advantages.
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true

  use_kl_in_reward: false
  kl_penalty: kl

  kl_ctrl:
    _target_: verl.trainer.config.KLControlConfig
    type: fixed
    kl_coef: 0.001
    horizon: 10000
    target_kl: 0.1

  use_pf_ppo: false
  pf_ppo:
    reweight_method: pow
    weight_pow: 2.0

  rollout_correction:
    rollout_is: null
    rollout_is_threshold: 2.0
    rollout_rs: null
    rollout_rs_threshold: null
    bypass_mode: false
    loss_type: ppo_clip
    rollout_is_batch_normalize: false

critic:
  # Compatibility with VERL RayPPOTrainer. QRPO does not use a critic.
  enable: false

reward:
  # Compatibility with VERL reward-loop / AgentLoop setup.
  num_workers: 0

  custom_reward_function:
    path: null
    name: compute_score

  reward_manager:
    _target_: verl.workers.config.reward_model.RewardManagerConfig
    source: register
    name: naive
    module:
      _target_: verl.trainer.config.config.ModuleConfig
      path: null
      name: custom_reward_manager

  reward_model:
    enable: false
    enable_resource_pool: false
    n_gpus_per_node: ${trainer.n_gpus_per_node}
    nnodes: ${trainer.nnodes}
    model_path: null
    rollout:
      _target_: verl.workers.config.RolloutConfig
      name: vllm
      dtype: ${qrpo_runtime.compute_dtype}
      gpu_memory_utilization: 0.5
      enforce_eager: true
      cudagraph_capture_sizes: null
      free_cache_engine: true
      data_parallel_size: 1
      expert_parallel_size: 1
      tensor_model_parallel_size: 1
      max_num_batched_tokens: 8192
      max_model_len: 8192
      max_num_seqs: 256
      load_format: auto
      engine_kwargs: {}
      limit_images: null
      enable_chunked_prefill: true
      enable_prefix_caching: true
      disable_log_stats: true
      skip_tokenizer_init: false
      prompt_length: 4096
      response_length: 4096

  sandbox_fusion:
    url: null
    max_concurrent: 64
    memory_limit_mb: 1024

global_profiler:
  _target_: verl.utils.profiler.ProfilerConfig

  tool: null
  steps: null
  profile_continuous_steps: false
  save_path: outputs/profile

  global_tool_config:
    nsys:
      _target_: verl.utils.profiler.config.NsightToolConfig
      discrete: false
      controller_nsight_options:
        trace: cuda,nvtx,cublas,ucx
        cuda-memory-usage: "true"
        cuda-graph-trace: graph
      worker_nsight_options:
        trace: cuda,nvtx,cublas,ucx
        cuda-memory-usage: "true"
        cuda-graph-trace: graph
        capture-range: cudaProfilerApi
        capture-range-end: null
        kill: none

    torch_memory:
      trace_alloc_max_entries: 100000
      stack_depth: 32
      context: all
      stacks: all
      kw_args: {}

transfer_queue:
  enable: false

offline_tokenization:
  require_assistant_mask: true
  verify_prompt_prefix: true
  require_same_tools: true
  truncation: false
  max_length: ${data.max_prompt_length}
  temperature: 1.0
